<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - BeerTestShop</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom styles -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/" data-testid="nav-brand">
                <i class="bi bi-cup-straw"></i> BeerTestShop
            </a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/" data-testid="nav-home">Главная</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Форма входа -->
    <main class="flex-grow-1">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-75">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="bi bi-cup-straw text-warning" style="font-size: 3rem;"></i>
                                <h3 class="mt-3" data-testid="login-title">Вход в систему</h3>
                                <p class="text-muted" data-testid="login-subtitle">
                                    Введите свои данные для входа
                                </p>
                            </div>

                            <!-- Сообщение об ошибке -->
                            <div id="error-message" class="alert alert-danger hidden" role="alert" data-testid="login-error">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                <span id="error-text"></span>
                            </div>

                            <!-- Сообщение об успехе -->
                            <div id="success-message" class="alert alert-success hidden" role="alert" data-testid="login-success">
                                <i class="bi bi-check-circle-fill"></i>
                                <span>Вход выполнен успешно!</span>
                            </div>

                            <form id="login-form" novalidate>
                                <div class="mb-3">
                                    <label for="input-username" class="form-label" data-testid="label-username">
                                        <i class="bi bi-person"></i> Имя пользователя
                                    </label>
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="input-username" 
                                        name="username"
                                        placeholder="Введите логин"
                                        required
                                        data-testid="input-username"
                                        autocomplete="username"
                                    >
                                    <div class="invalid-feedback" data-testid="username-error">
                                        Введите имя пользователя
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="input-password" class="form-label" data-testid="label-password">
                                        <i class="bi bi-lock"></i> Пароль
                                    </label>
                                    <input 
                                        type="password" 
                                        class="form-control" 
                                        id="input-password" 
                                        name="password"
                                        placeholder="Введите пароль"
                                        required
                                        data-testid="input-password"
                                        autocomplete="current-password"
                                    >
                                    <div class="invalid-feedback" data-testid="password-error">
                                        Введите пароль
                                    </div>
                                </div>

                                <div class="d-grid gap-2">
                                    <button 
                                        type="submit" 
                                        class="btn btn-beer btn-lg" 
                                        data-testid="btn-submit-login"
                                    >
                                        <i class="bi bi-box-arrow-in-right"></i> Войти
                                    </button>
                                </div>
                            </form>

                            <!-- Тестовые учётные данные -->
                            <div class="mt-4 p-3 bg-light rounded">
                                <small class="text-muted" data-testid="test-credentials-label">
                                    <strong>Тестовые учётные данные:</strong>
                                </small>
                                <div class="mt-2">
                                    <small class="d-block text-muted" data-testid="test-admin">
                                        <i class="bi bi-shield-check"></i> Admin: 
                                        <code>admin / admin123</code>
                                    </small>
                                    <small class="d-block text-muted" data-testid="test-user">
                                        <i class="bi bi-person"></i> User: 
                                        <code>user / user123</code>
                                    </small>
                                </div>
                            </div>

                            <div class="text-center mt-4">
                                <a href="/" class="text-decoration-none" data-testid="link-back-home">
                                    <i class="bi bi-arrow-left"></i> Вернуться на главную
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="mb-0" data-testid="footer-copyright">
                        &copy; 2026 BeerTestShop. Все права защищены.
                    </p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#" data-testid="footer-about">О нас</a> |
                    <a href="#" data-testid="footer-contact">Контакты</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API module -->
    <script src="/js/api.js"></script>
    <!-- Auth module -->
    <script src="/js/auth.js"></script>
    
    <script>
        // Обработка формы входа
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = this;
            const usernameInput = document.getElementById('input-username');
            const passwordInput = document.getElementById('input-password');
            const errorContainer = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.querySelector('[data-testid="btn-submit-login"]');
            
            // Скрыть предыдущие ошибки
            errorContainer.classList.add('hidden');
            form.classList.remove('was-validated');
            
            // Валидация
            if (!usernameInput.value.trim() || !passwordInput.value) {
                form.classList.add('was-validated');
                return;
            }
            
            // Блокировка кнопки
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Вход...';
            
            try {
                const result = await login(usernameInput.value.trim(), passwordInput.value);
                
                // Сохранение пользователя
                saveUser({
                    username: result.username,
                    role: result.role
                });
                
                // Показ успеха
                document.getElementById('success-message').classList.remove('hidden');
                
                // Перенаправление
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    window.location.href = redirect || '/catalog.html';
                }, 500);
                
            } catch (error) {
                // Показ ошибки
                errorText.textContent = error.message || 'Ошибка входа';
                errorContainer.classList.remove('hidden');
            } finally {
                // Разблокировка кнопки
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Войти';
            }
        });
        
        // Проверка, авторизован ли пользователь
        document.addEventListener('DOMContentLoaded', function() {
            if (isAuthenticated()) {
                // Уже авторизован - перенаправить на главную
                window.location.href = '/catalog.html';
            }
        });
    </script>
</body>
</html>
