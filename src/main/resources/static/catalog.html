<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - BeerTestShop</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom styles -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/" data-testid="nav-brand">
                <i class="bi bi-cup-straw"></i> BeerTestShop
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/" data-testid="nav-home">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/catalog.html" data-testid="nav-catalog">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/feedback.html" data-testid="nav-feedback">Отзывы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cart.html" data-testid="nav-cart">
                            <i class="bi bi-cart"></i> Корзина
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/warehouse.html" data-testid="nav-warehouse">
                            <i class="bi bi-box-seam"></i> Склад
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="flex-grow-1 py-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 data-testid="catalog-title">Каталог пива</h1>
                <span class="badge bg-primary" id="products-count" data-testid="products-count">0 товаров</span>
            </div>

            <!-- Уведомления -->
            <div id="notification-container" class="toast-container" aria-live="polite"></div>

            <!-- Индикатор загрузки -->
            <div id="loading-spinner" class="loading-spinner" data-testid="loading-spinner">
                <div class="spinner-border text-warning" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
            </div>

            <!-- Сетка товаров -->
            <div id="products-grid" class="row g-4" data-testid="products-grid">
                <!-- Товары будут загружены через JS -->
            </div>

            <!-- Сообщение если нет товаров -->
            <div id="no-products" class="text-center py-5 hidden" data-testid="no-products">
                <i class="bi bi-basket" style="font-size: 4rem; color: #dee2e6;"></i>
                <h3 class="mt-3 text-muted">Товары не найдены</h3>
                <p class="text-muted">Попробуйте позже или обратитесь к администратору</p>
            </div>
        </div>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="mb-0" data-testid="footer-copyright">
                        &copy; 2026 BeerTestShop. Все права защищены.
                    </p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#" data-testid="footer-about">О нас</a> |
                    <a href="#" data-testid="footer-contact">Контакты</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Модальное окно добавления в корзину -->
    <div class="modal fade" id="addToCartModal" tabindex="-1" aria-labelledby="addToCartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addToCartModalLabel" data-testid="modal-add-title">Добавить в корзину</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="modal-product-id">
                    <p id="modal-product-name" data-testid="modal-product-name"></p>
                    <div class="mb-3">
                        <label for="modal-quantity" class="form-label" data-testid="label-quantity">Количество:</label>
                        <input
                            type="number"
                            class="form-control"
                            id="modal-quantity"
                            value="1"
                            min="1"
                            max="5"
                            data-testid="input-quantity"
                        >
                        <small class="text-muted">Максимум 5 шт одного товара</small>
                    </div>
                    <p id="modal-stock-info" class="text-muted" data-testid="modal-stock-info"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-testid="btn-modal-cancel">
                        Отмена
                    </button>
                    <button type="button" class="btn btn-beer" id="btn-confirm-add" data-testid="btn-modal-confirm">
                        <i class="bi bi-cart-plus"></i> Добавить в корзину
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно ошибки -->
    <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-danger">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="errorModalLabel">
                        <i class="bi bi-exclamation-triangle"></i> Ошибка
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <p id="error-message"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Понятно</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API module -->
    <script src="/js/api.js"></script>

    <script>
        let products = [];
        let addToCartModal;
        let errorModal;

        // Экранирование HTML
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Показать уведомление
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification-container');
            const toastId = 'toast-' + Date.now();

            const toastHtml = `
                <div id="${toastId}" class="toast align-items-center text-white bg-${type} border-0" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                            ${escapeHtml(message)}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', toastHtml);
            const toastElement = document.getElementById(toastId);
            const toast = new bootstrap.Toast(toastElement);
            toast.show();

            // Удалить после скрытия
            toastElement.addEventListener('hidden.bs.toast', () => {
                toastElement.remove();
            });
        }

        // Показать модальное окно ошибки
        function showError(message) {
            document.getElementById('error-message').textContent = message;
            errorModal.show();
        }
        
        // Отрисовка карточки товара
        function renderProductCard(product) {
            const isInactive = !product.isActive;
            const isOutOfStock = product.quantity === 0;
            const imageUrl = product.imageUrl || '';

            return `
                <div class="col-md-6 col-lg-4" data-testid="product-card-${product.id}">
                    <div class="card product-card h-100 ${isInactive ? 'product-status-inactive' : ''}">
                        <div class="product-image-container" data-testid="product-image-${product.id}" style="height: 200px; overflow: hidden; background-color: #fef3c7; border-radius: 0.25rem 0.25rem 0 0;">
                            ${imageUrl 
                                ? `<img src="${imageUrl}" alt="${escapeHtml(product.name)}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'image-placeholder\\' style=\\'height: 100%;\\'><i class=\\'bi bi-cup-straw\\'></i></div>'">`
                                : `<div class="image-placeholder" style="height: 100%;"><i class="bi bi-cup-straw"></i></div>`
                            }
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" data-testid="product-name-${product.id}">${escapeHtml(product.name)}</h5>
                            <p class="card-text text-muted small flex-grow-1" data-testid="product-description-${product.id}">
                                ${escapeHtml(product.description)}
                            </p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span class="product-price" data-testid="product-price-${product.id}">${product.price} ₽</span>
                                <span class="product-quantity" data-testid="product-quantity-${product.id}">
                                    <i class="bi bi-box"></i> ${product.quantity} шт
                                </span>
                            </div>
                            <div class="mt-3">
                                ${isOutOfStock || isInactive
                                    ? `<button class="btn btn-secondary w-100" disabled data-testid="btn-out-of-stock-${product.id}">
                                         ${isInactive ? 'Неактивен' : 'Нет в наличии'}
                                       </button>`
                                    : `<button class="btn btn-beer w-100"
                                             data-testid="btn-add-to-cart-${product.id}"
                                             onclick="openAddToCartModal(${product.id})">
                                         <i class="bi bi-cart-plus"></i> В корзину
                                       </button>`
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Загрузка товаров
        async function loadProducts() {
            const spinner = document.getElementById('loading-spinner');
            const grid = document.getElementById('products-grid');
            const noProducts = document.getElementById('no-products');
            const countLabel = document.getElementById('products-count');

            console.log('Loading products...');

            try {
                products = await getProducts();
                console.log('Products loaded:', products);

                spinner.classList.add('hidden');

                if (products.length === 0) {
                    grid.innerHTML = '';
                    noProducts.classList.remove('hidden');
                    countLabel.textContent = '0 товаров';
                    return;
                }

                grid.innerHTML = products.map(renderProductCard).join('');
                noProducts.classList.add('hidden');
                countLabel.textContent = `${products.length} товар(а/ов)`;

            } catch (error) {
                console.error('Error loading products:', error);
                spinner.classList.add('hidden');
                grid.innerHTML = '';
                noProducts.classList.remove('hidden');
                noProducts.querySelector('h3').textContent = 'Ошибка загрузки';
                showNotification('Не удалось загрузить товары', 'danger');
            }
        }
        
        // Открыть модальное окно добавления в корзину
        function openAddToCartModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            document.getElementById('modal-product-id').value = product.id;
            document.getElementById('modal-product-name').textContent = product.name;
            document.getElementById('modal-quantity').value = 1;
            document.getElementById('modal-quantity').max = Math.min(5, product.quantity);
            document.getElementById('modal-stock-info').textContent = `Доступно: ${product.quantity} шт`;
            
            addToCartModal.show();
        }
        
        // Подтверждение добавления в корзину
        async function confirmAddToCart() {
            const productId = parseInt(document.getElementById('modal-product-id').value);
            const quantity = parseInt(document.getElementById('modal-quantity').value);
            const product = products.find(p => p.id === productId);

            if (!product || quantity < 1 || quantity > product.quantity) {
                showError('Некорректное количество товара. Доступно: ' + (product ? product.quantity : 0) + ' шт.');
                return;
            }

            const confirmBtn = document.getElementById('btn-confirm-add');
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Добавление...';

            try {
                await addToCart(productId, quantity);
                addToCartModal.hide();
                showNotification(`Добавлено ${quantity} шт "${product.name}" в корзину`);
                
                // Обновляем количество товара
                product.quantity -= quantity;
                
                // Обновляем отображение товаров
                const grid = document.getElementById('products-grid');
                grid.innerHTML = products.map(renderProductCard).join('');
            } catch (error) {
                addToCartModal.hide();
                showError(error.message || 'Ошибка добавления в корзину');
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.innerHTML = '<i class="bi bi-cart-plus"></i> Добавить в корзину';
            }
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            addToCartModal = new bootstrap.Modal(document.getElementById('addToCartModal'));
            errorModal = new bootstrap.Modal(document.getElementById('errorModal'));

            document.getElementById('btn-confirm-add').addEventListener('click', confirmAddToCart);

            loadProducts();
        });
    </script>
</body>
</html>
